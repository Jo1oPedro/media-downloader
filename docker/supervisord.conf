[unix_http_server]
file=/var/run/supervisor.sock
chmod=0770
chown=nobody:nogroup

[supervisord]
nodaemon=true
user=root
logfile=/var/log/supervisord.log
pidfile=/var/run/supervisord.pid

[program:discord]
command=docker-php-entrypoint php -d variables_order=EGPCS /var/www/app/index.php
directory=/var/www/app
autostart=true
autorestart=true
nodaemon=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

[program:external-system]
command=docker-php-entrypoint php -d variables_order=EGPCS /var/www/app/consume-external-system/index.php
directory=/var/www/app/consume-external-system
autostart=true
autorestart=true
nodaemon=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

[program:consume-discord]
command=docker-php-entrypoint php -d variables_order=EGPCS /var/www/app/consume-discord/index.php
directory=/var/www/app/consume-discord
autostart=true
autorestart=true
nodaemon=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

